apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: semantic-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: semantic-backend
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: semantic-frontend
            port:
              number: 80
