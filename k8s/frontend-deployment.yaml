apiVersion: apps/v1
kind: Deployment
metadata:
  name: semantic-frontend
  labels:
    app: semantic-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: semantic-frontend
  template:
    metadata:
      labels:
        app: semantic-frontend
    spec:
      containers:
      - name: semantic-frontend
        image: dharaniprasads/semantic-frontend:latest
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: semantic-config
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
