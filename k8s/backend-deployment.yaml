apiVersion: apps/v1
kind: Deployment
metadata:
  name: semantic-backend
  labels:
    app: semantic-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: semantic-backend
  template:
    metadata:
      labels:
        app: semantic-backend
    spec:
      containers:
      - name: semantic-backend
        image: dharaniprasads/semantic-backend:latest
        ports:
        - containerPort: 8000
        volumeMounts:
        - name: models-volume
          mountPath: /app/models
      volumes:
      - name: models-volume
        persistentVolumeClaim:
          claimName: backend-models-pvc
